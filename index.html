<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Board de Nathanaël</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f4f7f9; /* Gris très doux pour les yeux */
        }
        h1 { color: #333; }
        
        /* Style pour les gros boutons */
        .big-button {
            display: block;
            width: 80%; /* Largeur pour être facile à viser */
            max-width: 400px;
            margin: 20px auto;
            padding: 20px;
            font-size: 22px; /* Texte bien lisible */
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px; /* Bords bien arrondis */
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s; /* Petit effet au clic */
        }
        
        .btn-mots { background-color: #2D9CDB; } /* Bleu */
        .btn-board { background-color: #27AE60; } /* Vert pour le tableau */
        
        .big-button:active { transform: scale(0.95); } /* Sensation de clic */
    </style>
</head>
<body>

    <h1>Bienvenue sur le Board de Nathanaël</h1>

    <a href="https://acrobat.adobe.com/id/urn:aaid:sc:EU:3340a9d1-c9ca-4db3-84e0-0debdf3a5519" class="big-button btn-mots">
        📖 Liste de mots
    </a>

    <a href="https://www.icloud.com/numbers/078XYEvcNr5E7BLiCEQUM1Vyw#Répéter_10_Mots_par_jours" target="_blank" class="big-button btn-board">
        📊 Voir le Board (Mise à jour directe)
    </a>

</body>
</html>
