<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Définir le mot de passe - Nathanaël</title>
    <style>
      :root { color-scheme: dark; --bg-color: #12141a; --text-color: #eef1f6; --panel-bg: rgba(255, 255, 255, 0.04); --panel-border: rgba(255, 255, 255, 0.08); --accent: #8aa5c3; }
      body { margin: 0; min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; align-items: center; justify-content: center; }
      .container { max-width: 400px; width: 90%; background-color: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; }
      h2 { margin-top: 0; color: #f7fbff; }
      p { color: #c9d4e1; font-size: 0.95rem; line-height: 1.5; margin-bottom: 25px; }
      input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--panel-border); background: #273343; color: #fff; margin-bottom: 12px; font-size: 1rem; outline: none; box-sizing: border-box; }
      .btn { width: 100%; padding: 14px; font-size: 1rem; font-weight: 700; border: none; border-radius: 14px; color: #fff; background-color: var(--accent); cursor: pointer; transition: opacity 0.2s; }
      .btn:hover { opacity: 0.9; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      #message { margin-top: 15px; font-weight: bold; display: none; }
      .success { color: #28a745; }
      .error { color: #ff4d4d; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Nouveau mot de passe</h2>
      <p id="instruction">Veuillez définir votre mot de passe pour le compte <strong id="display-login">...</strong></p>
      <form id="reset-form">
        <input type="password" id="password" placeholder="Nouveau mot de passe" required minlength="6">
        <input type="password" id="confirm" placeholder="Confirmer le mot de passe" required minlength="6">
        <button type="submit" class="btn" id="submit-btn">Enregistrer mon mot de passe</button>
      </form>
      <div id="message"></div>
      <div id="back-home" style="margin-top: 20px; display: none;"><a href="index.html" style="color: var(--accent); text-decoration: none; font-size: 0.9rem;">Retour à la page de connexion</a></div>
    </div>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const login = urlParams.get('login');
      const API_BASE = (window.location.port === '3000') ? '' : `http://100.99.13.22:3000`;
      if (login) document.getElementById('display-login').textContent = login;
      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        if (password !== document.getElementById('confirm').value) {
            alert("Les mots de passe ne correspondent pas."); return;
        }
        try {
          const response = await fetch(`${API_BASE}/api/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password })
          });
          if (response.ok) {
            document.getElementById('message').textContent = "Mot de passe enregistré !";
            document.getElementById('message').className = 'success';
            document.getElementById('message').style.display = 'block';
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('back-home').style.display = 'block';
          }
        } catch (err) { alert("Erreur réseau"); }
      });
    </script>
  </body>
</html>
