<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Définir le mot de passe - Nathanaël</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-color: #12141a;
        --text-color: #eef1f6;
        --subtext-color: #c9d4e1;
        --panel-bg: rgba(255, 255, 255, 0.05);
        --panel-border: rgba(255, 255, 255, 0.1);
        --input-bg: #273343;
        --accent: #8aa5c3;
        --btn-bg: #8aa5c3;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Segoe UI', Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 400px;
        background-color: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 20px;
        padding: 32px 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      h2 { margin: 0 0 8px; color: #f7fbff; font-size: 1.5rem; }

      .subtitle {
        color: var(--subtext-color);
        font-size: 0.9rem;
        margin: 0 0 24px;
        line-height: 1.5;
      }

      /* ── Champ mot de passe avec œil ─── */
      .pwd-wrap {
        position: relative;
        margin-bottom: 12px;
      }

      .pwd-wrap input {
        width: 100%;
        padding: 14px 46px 14px 14px;
        border-radius: 12px;
        border: 1px solid var(--panel-border);
        background: var(--input-bg);
        color: var(--text-color);
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s ease;
      }

      .pwd-wrap input:focus {
        border-color: rgba(138, 165, 195, 0.6);
      }

      .pwd-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--subtext-color);
        font-size: 1.1rem;
        padding: 4px;
        line-height: 1;
        transition: color 0.15s ease;
      }

      .pwd-toggle:hover { color: var(--text-color); }

      /* ── Indicateurs de format ─── */
      .pwd-requirements {
        text-align: left;
        margin: 6px 0 18px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .req {
        font-size: 0.82rem;
        display: flex;
        align-items: center;
        gap: 6px;
        color: #94a2b6;
        transition: color 0.2s ease;
      }

      .req::before {
        content: '✗';
        font-weight: 700;
        color: #ef4444;
        font-size: 0.75rem;
        flex-shrink: 0;
        transition: color 0.2s ease;
      }

      .req.ok { color: #86efac; }
      .req.ok::before { content: '✓'; color: #22c55e; }

      /* ── Bouton ─── */
      .btn {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        font-weight: 700;
        border: none;
        border-radius: 14px;
        color: #fff;
        background-color: var(--btn-bg);
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
        margin-top: 4px;
      }

      .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
      .btn:disabled { opacity: 0.45; cursor: not-allowed; }

      /* ── Messages inline ─── */
      #message {
        margin-top: 16px;
        font-size: 0.9rem;
        font-weight: 600;
        display: none;
        padding: 10px 14px;
        border-radius: 10px;
      }

      #message.success {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.3);
      }

      #message.error {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      #back-home {
        margin-top: 18px;
        display: none;
      }

      #back-home a {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.9rem;
      }

      #back-home a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Nouveau mot de passe</h2>
      <p class="subtitle">Compte : <strong id="display-login">…</strong></p>

      <form id="reset-form" novalidate>
        <div class="pwd-wrap">
          <input type="password" id="password" placeholder="Nouveau mot de passe"
                 autocomplete="new-password" required>
          <button type="button" class="pwd-toggle" data-for="password" aria-label="Afficher le mot de passe">👁</button>
        </div>

        <div class="pwd-requirements" role="list" aria-label="Règles du mot de passe">
          <span class="req" id="req-length" role="listitem">6 caractères minimum</span>
          <span class="req" id="req-upper"  role="listitem">1 lettre majuscule</span>
          <span class="req" id="req-number" role="listitem">1 chiffre</span>
        </div>

        <div class="pwd-wrap">
          <input type="password" id="confirm" placeholder="Confirmer le mot de passe"
                 autocomplete="new-password" required>
          <button type="button" class="pwd-toggle" data-for="confirm" aria-label="Afficher le mot de passe">👁</button>
        </div>

        <button type="submit" class="btn" id="submit-btn" disabled>Enregistrer mon mot de passe</button>
      </form>

      <div id="message" role="alert"></div>
      <div id="back-home"><a href="index.html">Retour à la page de connexion</a></div>
    </div>

    <script>
      const API_BASE = (window.location.hostname === 'localhost' || window.location.port === '3000')
        ? '' : window.location.origin;

      const urlParams = new URLSearchParams(window.location.search);
      const login = urlParams.get('login') || '';
      document.getElementById('display-login').textContent = login || '(non défini)';

      const pwdInput     = document.getElementById('password');
      const confirmInput = document.getElementById('confirm');
      const submitBtn    = document.getElementById('submit-btn');
      const msgEl        = document.getElementById('message');

      const reqLength = document.getElementById('req-length');
      const reqUpper  = document.getElementById('req-upper');
      const reqNumber = document.getElementById('req-number');

      function checkRequirements(val) {
        const okLength = val.length >= 6;
        const okUpper  = /[A-Z]/.test(val);
        const okNumber = /\d/.test(val);
        reqLength.classList.toggle('ok', okLength);
        reqUpper.classList.toggle('ok',  okUpper);
        reqNumber.classList.toggle('ok', okNumber);
        return okLength && okUpper && okNumber;
      }

      function updateSubmitState() {
        const valid = checkRequirements(pwdInput.value) && pwdInput.value === confirmInput.value;
        submitBtn.disabled = !valid;
      }

      pwdInput.addEventListener('input', updateSubmitState);
      confirmInput.addEventListener('input', updateSubmitState);

      // Show / hide password toggles
      document.querySelectorAll('.pwd-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.for);
          const showing = input.type === 'text';
          input.type = showing ? 'password' : 'text';
          btn.textContent = showing ? '👁' : '🙈';
          btn.setAttribute('aria-label', showing ? 'Afficher le mot de passe' : 'Masquer le mot de passe');
        });
      });

      function showMsg(text, type) {
        msgEl.textContent = text;
        msgEl.className = type;
        msgEl.style.display = 'block';
      }

      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = pwdInput.value;

        if (password !== confirmInput.value) {
          showMsg('Les mots de passe ne correspondent pas.', 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Enregistrement…';
        msgEl.style.display = 'none';

        try {
          const response = await fetch(`${API_BASE}/api/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login, password })
          });

          const result = await response.json();

          if (response.ok) {
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('back-home').style.display = 'block';
            showMsg('Mot de passe enregistré avec succès !', 'success');
          } else {
            showMsg(result.error || 'Erreur lors de la mise à jour.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Enregistrer mon mot de passe';
          }
        } catch (err) {
          showMsg('Erreur réseau. Vérifiez votre connexion.', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Enregistrer mon mot de passe';
        }
      });
    </script>
  </body>
</html>
