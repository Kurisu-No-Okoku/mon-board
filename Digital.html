<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Outils Digitaux</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
        background-color: #181a1c; /* Couleur de fond */
      }
      h1 {
        color: #333;
      }

      /* Style pour les gros boutons */
      .big-button {
        display: block;
        width: 80%; /* Largeur pour être facile à viser */
        max-width: 400px;
        margin: 20px auto;
        padding: 20px;
        font-size: 22px; /* Texte bien lisible */
        font-weight: bold;
        color: white;
        border: none;
        border-radius: 15px; /* Bords bien arrondis */
        cursor: pointer;
        text-decoration: none;
        transition: transform 0.2s; /* Petit effet au clic */
      }

      .btn-mots {
        background-color: #2d9cdb;
      } /* Bleu */
      .btn-board {
        background-color: #27ae60;
      } /* Vert pour le tableau */

      .big-button:active {
        transform: scale(0.95);
      } /* Sensation de clic */
    </style>
  </head>
  <body>
    <h1>Bienvenue sur l'espace Digital</h1>

    <a
      href=""
      class="big-button btn-mots"
    >
      📖 Liste des Véhicules Couverts
    </a>

    <a
      href="https://form.jotform.com/260987998219077"
      target="_blank"
      class="big-button btn-board"
    >
      📊 Demande Digital pour Véhicule
    </a>
  </body>
</html>
